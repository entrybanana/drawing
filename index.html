<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Drawing Studio</title>

    <link
        rel="stylesheet"
        href="style.css">
</head>

<body>

<div id="toolbar">

    <select id="tool">
        <option value="brush">브러시</option>
        <option value="eraser">지우개</option>
        <option value="line">직선</option>
        <option value="rect">사각형</option>
        <option value="circle">원</option>
        <option value="fill">채우기</option>
    </select>

    <select id="brushType">
        <option value="pencil">연필</option>
        <option value="airbrush">에어브러시</option>
        <option value="marker">형광펜</option>
    </select>

    <input
        type="color"
        id="color"
        value="#000000">

    <input
        type="range"
        id="size"
        min="1"
        max="100"
        value="5">

    <select id="layerSelect">
        <option value="0">레이어 1</option>
        <option value="1">레이어 2</option>
        <option value="2">레이어 3</option>
    </select>

    <button id="undoBtn">
        ↩ 실행취소
    </button>

    <button id="redoBtn">
        ↪ 다시실행
    </button>

    <button id="zoomIn">
        🔍+
    </button>

    <button id="zoomOut">
        🔍-
    </button>

    <button id="savePNG">
        PNG 저장
    </button>

    <button id="saveProject">
        프로젝트 저장
    </button>

    <input
        type="file"
        id="loadProject"
        hidden>

    <button id="loadBtn">
        프로젝트 열기
    </button>

    <button id="darkMode">
        🌙
    </button>

</div>

<div id="canvasWrapper">

</div>

<script src="script.js"></script>

</body>
</html>
